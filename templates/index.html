<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Chatbot - Gemini</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">🤖</div>
        <div>
            <p>Gemini Assistente</p>
            <p style="font-size: 11px; font-weight: normal; color: #d1edde;">online</p>
        </div>
    </div>

    <div id="chatbox">
        <div class="message bot-msg">Olá! Como posso ajudar você hoje? 😊</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Digite uma mensagem" onkeydown="verificarEnter(event)">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script src="{{ url_for('static', filename='js/chat.js') }}"></script>

</body>
</html>
